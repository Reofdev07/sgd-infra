# nginx/sgd.conf — Reverse proxy para SGD (Frontend SPA + Laravel API + OSAI + Reverb WS)
# Usa resolver para que nginx arranque aunque los backends no estén listos aún

resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 80;
    server_name _;

    # Frontend SPA (estáticos)
    root /usr/share/nginx/html;
    index index.html;

    # Gzip — comprime respuestas para navegar más rápido
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # --- Frontend SPA (Vue/Quasar) ---
    # Assets estáticos con cache largo (los nombres tienen hash, son inmutables)
    location ~* \.(?:js|css|woff2?|png|jpe?g|gif|svg|ico|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Certbot challenge (Let's Encrypt HTTP-01)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # SPA fallback: cualquier ruta desconocida sirve index.html
    # (necesario para Vue Router en modo history — /login, /users, etc.)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # --- Laravel API (FastCGI a PHP-FPM) ---
    # F1: usa fastcgi_pass (no proxy_pass) porque PHP-FPM habla FastCGI, no HTTP
    # Usamos variable $backend_app para que resuelva via resolver en runtime
    location /api {
        set $backend_app "app:9000";
        fastcgi_pass $backend_app;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300s;
    }

    # --- Laravel Storage (archivos públicos servidos directamente) ---
    location ^~ /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Broadcasting auth (Laravel Echo) ---
    location /broadcasting/auth {
        set $backend_app "app:9000";
        fastcgi_pass $backend_app;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    }

    # --- OSAI API (proxy reverso a FastAPI) ---
    location /osai-api/ {
        rewrite ^/osai-api/(.*) /$1 break;
        proxy_pass http://osai:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # --- Reverb WebSocket ---
    # El frontend envía ws://HOST/ws/app/KEY — nginx quita el prefijo /ws
    # y pasa /app/KEY a reverb:8080
    location ^~ /ws/ {
        rewrite ^/ws/(.*) /$1 break;
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Headers de seguridad ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bloquear archivos ocultos (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
