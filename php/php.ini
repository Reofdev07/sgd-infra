; php/php.ini — Configuración de producción para Laravel

memory_limit = 256M
upload_max_filesize = 50M
post_max_size = 55M
max_execution_time = 300
max_input_time = 300
max_file_uploads = 20

; OPcache — acelera PHP cacheando el bytecode compilado
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0

; oci8 — timeout de conexión Oracle
[oci8]
oci8.timeout = 30
